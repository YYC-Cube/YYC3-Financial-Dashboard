# Dependabot 配置 — YYC³ 金融仪表盘
# 自动检查依赖更新，按生态系统分组配置

version: 2

updates:
  # npm 依赖（主要）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
      include: "scope"
    reviewers:
      - "YYC-Cube"
    groups:
      # React 生态分组
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-hook-form"
          - "@hookform/*"
      # Next.js 分组
      nextjs:
        patterns:
          - "next"
          - "@next/*"
      # Radix UI 分组
      radix:
        patterns:
          - "@radix-ui/*"
      # 开发依赖分组
      dev-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions 工作流
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "ci"
      include: "scope"
