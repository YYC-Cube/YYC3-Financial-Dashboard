name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Validate i18n locales
        run: |
          echo "=== 验证 10 种语言包完整性 ==="
          LOCALES=("zh-CN" "zh-TW" "en" "ja" "ko" "fr" "de" "es" "pt-BR" "ar")
          MISSING=0
          for loc in "${LOCALES[@]}"; do
            if [ -f "locales/${loc}.ts" ]; then
              echo "  [OK] ${loc}"
            else
              echo "  [MISSING] ${loc}"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "ERROR: ${MISSING} language pack(s) missing!"
            exit 1
          fi
          echo "All 10 language packs verified successfully."

      - name: Build
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
